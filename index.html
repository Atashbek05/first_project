<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 10px;
  padding: 10px;
  border: none;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  font-size: 16px;
}

button:hover {
  background: #2563eb;
}

.result {
  margin-top: 20px;
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  white-space: pre-wrap;
}

.file {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🤖 IELTS AI Checker</h2>

<textarea id="text" placeholder="Write your essay..."></textarea>

<button onclick="checkIELTS()">Check IELTS</button>

<input class="file" type="file" id="file">
<button onclick="uploadImage()">Scan Handwriting</button>

<div class="result" id="result">Result will appear here...</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// ⚠️ поменяешь потом на свой backend
const BACKEND = "http://127.0.0.1:8000";

async function checkIELTS() {
    let text = document.getElementById("text").value;

    document.getElementById("result").innerText = "⏳ Checking...";

    try {
        let res = await fetch(BACKEND + "/ielts", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({text})
        });

        let data = await res.json();
        document.getElementById("result").innerText = data.result;

    } catch (err) {
        document.getElementById("result").innerText = "❌ Error: " + err;
    }
}

async function uploadImage() {
    let file = document.getElementById("file").files[0];

    if (!file) {
        alert("Choose file first");
        return;
    }

    document.getElementById("result").innerText = "📸 Processing image...";

    let formData = new FormData();
    formData.append("file", file);

    try {
        let res = await fetch(BACKEND + "/ocr", {
            method: "POST",
            body: formData
        });

        let data = await res.json();

        document.getElementById("result").innerText =
            "📄 OCR:\n" + data.text +
            "\n\n📊 IELTS:\n" + data.ielts;

    } catch (err) {
        document.getElementById("result").innerText = "❌ Error: " + err;
    }
}
</script>

</body>
</html>
